<div class="container-fluid mt-4">

  <!-- Controls -->
  <div class="row justify-content-center mb-3">
    <div class="col-12 col-md-auto d-flex flex-wrap justify-content-center gap-2">

      <button class="btn btn-primary btn-sm" (click)="selectAll()">
        Select All
      </button>

      <button class="btn btn-secondary btn-sm" (click)="deselectAll()">
        Deselect All
      </button>

      <button class="btn btn-danger btn-sm" (click)="deleteSelected()">
        Delete Selected
      </button>

    </div>
  </div>

  <!-- Summary -->
  <div class="row justify-content-center text-center mb-3">
    <!-- <div class="col-12 col-md-6"> -->
    <div class="col-1">
      <strong>Selected Rows:</strong> {{ getSelectedCount() }}
    </div>
    <div class="col-1">
      <strong>Total Salary:</strong> ${{ getTotalSalary() | number: "1.0-0" }}
    </div>
  </div>

  <!-- Grid -->
  <div class="row">
    <div class="col-12">

      <div *ngIf="error" class="alert alert-danger">
        {{ error }}
      </div>

      <ag-grid-angular style="width: 100%; height: 80vh;" class="ag-theme-alpine" [rowData]="rowData"
        [columnDefs]="columnDefs" [rowSelection]="rowSelection" [suppressRowClickSelection]="suppressRowClickSelection"
        (rowClicked)="onRowClicked($event)" (selectionChanged)="onSelectionChanged()" [getRowId]="getRowId"
        [rowGroupPanelShow]="'always'" [sideBar]="sideBar" [pagination]="true" [statusBar]="statusBar"
        (gridReady)="onGridReady($event)">
      </ag-grid-angular>

      <div *ngIf="selectedRows.length > 0" class="mt-3 p-3 bg-light rounded">
        <h5>Selected Row Data (JSON):</h5>
        <pre class="mb-0" style="max-height: 200px; overflow: auto;">
{{ selectedRows | json }}
        </pre>
      </div>

    </div>
  </div>

</div>
